services:
  - type: web
    name: zabrat-api
    runtime: node
    plan: free
    buildCommand: npm install && cp src/prisma/schema.production.prisma src/prisma/schema.prisma && npx prisma generate --schema=src/prisma/schema.prisma && npx prisma db push --schema=src/prisma/schema.prisma --accept-data-loss && npx tsx src/prisma/seed.ts && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zabrat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: zabrat-db
    plan: free
    databaseName: zabrat
